name: Validate Skills

on:
  pull_request:
    paths:
      - '*/SKILL.md'
      - '**/*.md'
  push:
    branches:
      - main
    paths:
      - '*/SKILL.md'
      - '**/*.md'

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check skill structure
        run: |
          echo "Validating skill structure..."

          # Find all SKILL.md files (excluding .git directory)
          skill_files=$(find . -name "SKILL.md" -not -path "./.git/*")

          if [ -z "$skill_files" ]; then
            echo "No SKILL.md files found"
            exit 0
          fi

          failed=0

          # Check each SKILL.md file
          while IFS= read -r skill_file; do
            echo "Checking $skill_file..."

            # Check required sections
            if ! grep -q "## Metadata" "$skill_file"; then
              echo "❌ Missing required section: Metadata in $skill_file"
              failed=1
            else
              echo "✅ Found section: Metadata"
            fi

            if ! grep -q "## Triggers" "$skill_file"; then
              echo "❌ Missing required section: Triggers in $skill_file"
              failed=1
            else
              echo "✅ Found section: Triggers"
            fi

            if ! grep -q "## Instructions" "$skill_file"; then
              echo "❌ Missing required section: Instructions in $skill_file"
              failed=1
            else
              echo "✅ Found section: Instructions"
            fi

            # Check for metadata fields
            if ! grep -q "Name:" "$skill_file"; then
              echo "❌ Missing Name field in metadata"
              failed=1
            fi

            if ! grep -q "Version:" "$skill_file"; then
              echo "❌ Missing Version field in metadata"
              failed=1
            fi

            if ! grep -q "Description:" "$skill_file"; then
              echo "❌ Missing Description field in metadata"
              failed=1
            fi

            echo "---"
          done <<< "$skill_files"

          if [ $failed -eq 1 ]; then
            echo "❌ Validation failed!"
            exit 1
          fi

          echo "✅ All skills validated successfully!"

      - name: Check markdown formatting
        uses: DavidAnson/markdownlint-action@v1
        with:
          files: '**/*.md'
          config: |
            {
              "default": true,
              "MD013": false,
              "MD033": false,
              "MD041": false
            }
